# Ansible Inventory for Chapter 1 Lab
# Node roles:
#   first_server: The bootstrap node that initializes etcd and generates the join token
#   servers:      All control-plane nodes (includes first_server)
#   agents:       Worker-only nodes (none in this exercise)

[first_server]
gmk-node-01 ansible_host=10.20.10.11

[servers]
gmk-node-01 ansible_host=10.20.10.11
gmk-node-02 ansible_host=10.20.10.12
gmk-node-03 ansible_host=10.20.10.13

[joining_servers]
gmk-node-02 ansible_host=10.20.10.12
gmk-node-03 ansible_host=10.20.10.13

[agents]

[all:vars]
ansible_user=ubuntu
ansible_become=true
ansible_python_interpreter=/usr/bin/python3

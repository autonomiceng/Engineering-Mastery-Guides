---
# 02-rke2-install.yml
# Downloads and installs a pinned RKE2 version on all server nodes.
# NEVER use floating channels (stable, latest) in production.

- name: Install RKE2 binary
  hosts: servers
  become: true
  vars_files:
    - ../../constants.yaml

  roles:
    - role: ../roles/rke2_install

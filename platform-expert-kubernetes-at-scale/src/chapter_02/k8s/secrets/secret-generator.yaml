# KSOPS Secret Generator
# Kustomize exec plugin that decrypts SOPS-encrypted files during build.
# ArgoCD repo-server runs this automatically when building manifests.
#
# Each file listed below is a SOPS-encrypted Kubernetes Secret.
# KSOPS decrypts them using the age key mounted in the repo-server.

apiVersion: viaduct.ai/v1
kind: ksops
metadata:
  name: argocd-secrets
  annotations:
    config.kubernetes.io/function: |
      exec:
        path: ksops
files:
  - argocd-repo-creds.enc.yaml
